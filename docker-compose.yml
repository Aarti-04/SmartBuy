# docker-compose.yml
services:
  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
  
  backend:
    build: ./backend
    ports: ["8000:8000"]
    depends_on: [redis]
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      APIFY_TOKEN: ${APIFY_TOKEN}
    volumes:
      - ./backend:/app
  
  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    depends_on: [backend]
    volumes:
      - ./frontend:/app
      - /app/node_modules
